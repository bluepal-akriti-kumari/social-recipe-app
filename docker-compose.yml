services:
  db:
    image: postgres:15-alpine
    container_name: recipe-db
    env_file:
      - docker.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: recipe-backend
    env_file:
      - docker.env
    ports:
      - "8082:8082"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: recipe-frontend
    ports:
      - "5173:80"
    env_file:
      - docker.env
    depends_on:
      - backend

volumes:
  postgres_data:
